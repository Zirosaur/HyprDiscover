name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run backend tests
        run: |
          pytest tests/unit/ -v --cov=hyprdiscover --cov-report=term-missing \
            --ignore=tests/unit/test_main.py \
            --ignore=tests/unit/test_package_list.py \
            --ignore=tests/unit/test_preferences.py

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/hyprdiscover/ || true
        continue-on-error: true

  test-gtk:
    runs-on: ubuntu-latest
    container:
      image: fedora:41

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            python3 python3-pip \
            python3-gobject gtk4 \
            xorg-x11-server-Xvfb

      - name: Install Python test dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run GTK tests
        run: |
          xvfb-run pytest \
            tests/unit/test_main.py \
            tests/unit/test_package_list.py \
            tests/unit/test_preferences.py \
            -v --cov=hyprdiscover --cov-report=term-missing
