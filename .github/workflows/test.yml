name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev

      - name: Diagnose GObject dependencies
        run: |
          pkg-config --modversion girepository-2.0 || true
          pkg-config --modversion girepository-1.0 || true
          pkg-config --list-all | grep girepository || true
          pkg-config --modversion cairo || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        run: pytest -v --cov=hyprdiscover --cov-report=term-missing

      - name: Lint with ruff
        run: ruff check src/

      - name: Type check with mypy
        run: mypy src/hyprdiscover/ || true
        continue-on-error: true
